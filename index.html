<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Cosmética Natural</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
            margin: 0; padding: 0; height: 100vh;
        }

        #chat-button {
            position: fixed; bottom: 25px; right: 25px;
            width: 60px; height: 60px; background: #2ecc71;
            border-radius: 50%; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            color: white; font-size: 28px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.3s ease, background 0.3s ease;
            z-index: 9999;
        }
        #chat-button:hover { transform: scale(1.1); background: #27ae60; }

        #chat-container {
            position: fixed; bottom: 95px; right: 25px;
            width: 360px; height: 520px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            display: none; flex-direction: column; overflow: hidden; z-index: 9998;
        }

        #chat-header {
            background: #2ecc71; color: white; padding: 15px 20px;
            font-weight: bold; font-size: 16px;
            display: flex; justify-content: space-between; align-items: center;
        }
        #close-btn { cursor: pointer; font-size: 20px; opacity: 0.8; }

        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

        .message { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-wrap: break-word; animation: fadeIn 0.3s ease; }
        .user-message { background: #2ecc71; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bot-message { background: rgba(0, 0, 0, 0.06); color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        /* Estilo para las imágenes que se muestran dentro del chat */
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; }

        /* --- CONTENEDOR DE ENTRADA Y NUEVOS BOTONES --- */
        #input-container { padding: 12px; background: rgba(255, 255, 255, 0.5); border-top: 1px solid rgba(0, 0, 0, 0.05); display: flex; gap: 8px; align-items: center; position: relative; }
        #user-input { flex: 1; padding: 10px 14px; border: 1px solid rgba(0, 0, 0, 0.1); border-radius: 20px; outline: none; font-size: 14px; background: white; }
        #user-input:focus { border-color: #2ecc71; }
        
        /* Botón del clip multimedia */
        .file-label { background: rgba(0,0,0,0.05); color: #555; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; transition: background 0.2s; }
        .file-label:hover { background: rgba(0,0,0,0.1); }
        #file-input { display: none; }

        #send-btn { background: #2ecc71; color: white; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        #send-btn:hover { background: #27ae60; }

        /* Mini vista previa de la foto seleccionada arriba del input */
        #preview-container { display: none; padding: 5px 15px; background: rgba(255,255,255,0.9); border-top: 1px solid rgba(0,0,0,0.05); align-items: center; gap: 10px; }
        #img-preview { height: 40px; width: 40px; object-fit: cover; border-radius: 5px; }
        #remove-preview { cursor: pointer; color: red; font-weight: bold; font-size: 14px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="chat-button" onclick="toggleChat()">💄</div>

<div id="chat-container">
    <div id="chat-header">
        <span>Asistente Natural 🌿</span>
        <span id="close-btn" onclick="toggleChat()">×</span>
    </div>
    
    <div id="chat-box">
        <div class="message bot-message">¡Hola! ¿Cómo puedo ayudarte hoy? Puedes escribirme o subir una foto de los ingredientes de tu cosmético para que los analice. ✨</div>
    </div>
    
    <div id="preview-container">
        <img id="img-preview" src="" alt="Preview">
        <span style="font-size: 12px; color: #666; flex: 1;">Imagen cargada lista para analizar</span>
        <span id="remove-preview" onclick="clearImagePreview()">×</span>
    </div>
    
    <div id="input-container">
        <label for="file-input" class="file-label">📎</label>
        <input type="file" id="file-input" accept="image/*" onchange="previewImage(event)">
        
        <input type="text" id="user-input" placeholder="Pregúntame algo..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<audio id="sound-send" src="tu-sonido-enviar.mp3" preload="auto"></audio>
<audio id="sound-receive" src="tu-sonido-recibir.mp3" preload="auto"></audio>

<script>
    const sendAudio = document.getElementById("sound-send");
    const receiveAudio = document.getElementById("sound-receive");
    let selectedImageBase64 = null;

    function toggleChat() {
        const chatContainer = document.getElementById("chat-container");
        chatContainer.style.display = (chatContainer.style.display === "none" || chatContainer.style.display === "") ? "flex" : "none";
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }

    function previewImage(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            selectedImageBase64 = e.target.result;
            document.getElementById("img-preview").src = selectedImageBase64;
            document.getElementById("preview-container").style.display = "flex";
        }
        reader.readAsDataURL(file);
    }

    function clearImagePreview() {
        selectedImageBase64 = null;
        document.getElementById("file-input").value = "";
        document.getElementById("preview-container").style.display = "none";
    }

    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const message = inputField.value.trim();
        
        if (!message && !selectedImageBase64) return;

        let userMessageHTML = `<div class="message user-message">`;
        if (selectedImageBase64) {
            userMessageHTML += `<img src="${selectedImageBase64}" class="chat-img" />`;
        }
        if (message) {
            userMessageHTML += `<p style="margin: 5px 0 0 0;">${message}</p>`;
        }
        userMessageHTML += `</div>`;
        
        chatBox.innerHTML += userMessageHTML;
        
        const imageToSend = selectedImageBase64;
        clearImagePreview();
        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        sendAudio.play().catch(err => console.log("Efecto de audio envío listo."));

        try {
            // ⚠️ ACORDATE DE CAMBIAR ESTO POR TU URL REAL DE RENDER TERMINADA EN /chat
            const response = await fetch('https://chat-de-productos-naturales-3.onrender.com/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: message,
                    image: imageToSend 
                })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                const serverMsg = errorData.reply || errorData.error || `Código: ${response.status}`;
                chatBox.innerHTML += `<div class="message bot-message" style="color:red;">Error del servidor: ${serverMsg}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
                return;
            }

            const data = await response.json();
            
            if (data.reply) {
                chatBox.innerHTML += `<div class="message bot-message">${data.reply}</div>`;
                receiveAudio.play().catch(err => console.log("Efecto de audio recepción listo."));
            } else {
                chatBox.innerHTML += `<div class="message bot-message" style="color:red;">El backend no devolvió una respuesta válida.</div>`;
            }
        } catch (error) {
            chatBox.innerHTML += `<div class="message bot-message" style="color:red;">Error de conexión técnica: ${error.message}</div>`;
        }
        
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
